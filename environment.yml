name: enterprise-ai-context

channels:
  - conda-forge
  - defaults

dependencies:
  # Python
  - python=3.11

  # Package manager
  - pip

  # Core libraries
  - numpy
  - pandas
  - pydantic
  - datasets
  
  # Pip packages
  - pip:
      - langchain
      - langchain-core
      - langchain-community
      - langchain-text-splitters